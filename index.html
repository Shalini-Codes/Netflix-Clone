<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1 class="logo">NETFLIX</h1>
        <input type="text" placeholder="Search..." class="search">
        <a href="login.html"><button class="btn">Sign In</button></a>
    </div>

    <!-- Banner -->
    <div class="banner">
        <div class="banner-content">
            <h1>Unlimited movies, TV shows and more</h1>
            <p>Watch anywhere. Cancel anytime.</p>
            <button class="btn">Get Started</button>
        </div>
    </div>

    <!-- Rows -->
    <div class="row">
        <h2>Trending Now</h2>
        <div class="posters">
            <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
            <img src="https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg">
            <img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
            <img src="https://image.tmdb.org/t/p/w500/6KErczPBROQty7QoIsaa6wJYXZi.jpg">
        </div>
    </div>

    <div class="row">
        <h2>Top Rated</h2>
        <div class="posters">
            <img src="https://image.tmdb.org/t/p/w500/5KCVkau1HEl7ZzfPsKAPM0sMiKc.jpg">
            <img src="https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg">
            <img src="https://image.tmdb.org/t/p/w500/2CAL2433ZeIihfX1Hb2139CX0pW.jpg">
            <img src="https://image.tmdb.org/t/p/w500/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg">
        </div>
    </div>

    <div class="row">
        <h2>Action Movies</h2>
        <div class="posters">
            <img src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
            <img src="https://image.tmdb.org/t/p/w500/6KErczPBROQty7QoIsaa6wJYXZi.jpg">
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Questions? Call 000-800-040-1843</p>
        <p>FAQ | Help Center | Privacy | Terms</p>
    </div>

</body>
</html>
